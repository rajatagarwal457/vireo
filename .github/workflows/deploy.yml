name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          # The site is served at https://<user>.github.io/vireo (project page).
          # When the editvireo.com custom domain is configured in Settings → Pages,
          # delete NEXT_PUBLIC_BASE_PATH and set NEXT_PUBLIC_SITE_URL to
          # https://editvireo.com — the site will then serve from the domain root.
          NEXT_PUBLIC_BASE_PATH: /vireo
          NEXT_PUBLIC_SITE_URL: https://rajatagarwal457.github.io/vireo

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
